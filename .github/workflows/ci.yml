name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3028
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_PRO_PRICE_ID: price_ci_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
      SMOKE_BASE_URL: http://127.0.0.1:3028
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify build
        run: npm run verify

      - name: Run static readiness guard
        run: npm run readiness

      - name: Run smoke checks
        run: |
          npm run start -- -p 3028 &
          server_pid=$!
          trap "kill $server_pid" EXIT
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:3028/ >/dev/null; then
              npm run smoke
              exit 0
            fi
            sleep 1
          done
          echo "Server did not become ready"
          exit 1
